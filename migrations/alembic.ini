[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration file names.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# as well as the filename.
timezone = UTC

# Max length of characters to apply to the "slug" field.
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file.
sourceless = false

# Version location specification; This defaults to migrations/versions.
version_locations = %(here)s/migrations/versions

# The output encoding used when revision files are written from script.mako.
output_encoding = utf-8

# SQLAlchemy URL — overridden at runtime from config.py / .env
sqlalchemy.url = sqlite+aiosqlite:///./data/bot.db


[post_write_hooks]
# Uncomment to run black on generated migration files:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S